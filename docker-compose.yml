services:
  nixos-dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nixos-dev-${COMPOSE_PROJECT_NAME:-ghaf-hostname-patch}
    hostname: nixos-dev-${COMPOSE_PROJECT_NAME:-ghaf-hostname-patch}
    
    # Mount Docker socket to use host's Docker from inside container
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${WORKSPACE_DIR:-./workspace}:/workspace
      - /dev:/dev  # Full /dev so hot-plugged USB-serial / recovery devices propagate live
      - /run/udev:/run/udev:ro
      - nix-store:/nix
      - dev-home:/home/dev
      - ~/.ssh:/home/dev/.ssh:ro  # Mount SSH keys read-only for git
      - ~/.gitconfig:/home/dev/.gitconfig:ro  # Mount git config for identity
      - ./nix-dashboard.sh:/usr/local/bin/nix-dashboard:ro  # Build dashboard
    
    # Keep container running
    tty: true
    stdin_open: true

    # Raise file descriptor limits for large Nix evaluations/builds
    ulimits:
      nofile:
        soft: ${NOFILE_SOFT:-65536}
        hard: ${NOFILE_HARD:-1048576}
    
    # Health check to ensure nix-daemon is running
    healthcheck:
      test: ["CMD", "/nix/var/nix/profiles/default/bin/nix", "--version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    
    
    # Environment variables
    environment:
      - NIX_PATH=nixpkgs=https://github.com/NixOS/nixpkgs/archive/nixos-25.11.tar.gz
      - DOCKER_HOST=unix:///var/run/docker.sock
      - NIX_GC_INTERVAL_SECONDS=${NIX_GC_INTERVAL_SECONDS:-21600}
      - NIX_PROFILE_HISTORY_AGE=${NIX_PROFILE_HISTORY_AGE:-7d}
      - NIX_STORE_OPTIMISE=${NIX_STORE_OPTIMISE:-1}
    
    # Allow access to Docker socket
    group_add:
      - ${DOCKER_GID:-999}
      - ${DISK_GID:-994}
      - ${TTY_GID:-985}  # Host uucp/dialout gid - serial device (/dev/ttyUSB*) access
    
    # Enable KVM support
    devices:
      - /dev/kvm:/dev/kvm
      - /dev/sda:/dev/sda
    privileged: true
    
    # Resource limits (optional, adjust as needed)
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '4'
    #       memory: 8G
    #     reservations:
    #       cpus: '2'
    #       memory: 4G

volumes:
  nix-store:
    driver: local
  dev-home:
    driver: local
